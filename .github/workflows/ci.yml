name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/verda_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/verda_test
      NEXTAUTH_SECRET: ci-nextauth-secret
      AUTH_SECRET: ci-auth-secret
    steps:
      - uses: actions/checkout@v6
        with:
          # Required for gitleaks to scan history, not just the tip commit.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Restore turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare database
        run: |
          cd packages/database
          bun run db:migrate:deploy
          bun run db:seed

      - name: Lint (ultracite)
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Install Playwright browser
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Reader profile Playwright smoke
        run: cd apps/web && bunx playwright test e2e/reader-profile.spec.ts

      - name: Spell-check (typos)
        uses: crate-ci/typos@master

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
