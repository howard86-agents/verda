name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # `prisma generate` runs as a dep of `turbo run typecheck`. It only needs
      # the schema, not a real DB, but prisma.config.ts wants DATABASE_URL set.
      DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
        with:
          # Required for gitleaks to scan history, not just the tip commit.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Restore turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ultracite)
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Spell-check (typos)
        uses: crate-ci/typos@master

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
