# typos config ‚Äî https://github.com/crate-ci/typos
# Flags only known misspellings (typos‚Üítypos, recieve‚Üíreceive). Domain
# vocabulary that looks like a typo gets allowlisted here.

[default.extend-words]
# IATA / airport codes used as city identifiers in member records
TPE = "TPE"

[files]
extend-exclude = [
  "bun.lock",
  "*.svg",
  "**/staging/**",
  "**/generated/**",
  "**/.next/**",
  "**/dist/**",
  "**/node_modules/**",
]
